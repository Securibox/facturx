name: CI checks

on: [pull_request]

jobs:
  build:
    name: Build on ${{matrix.os}} with .NET ${{matrix.dotnet}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        dotnet: ['8.x', '9.x', '10.x']
        os: ['ubuntu-latest']

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET ${{matrix.dotnet}}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{matrix.dotnet}}
        cache: true
        cache-dependency-path: "**/packages.lock.json"

    - name: Install dependencies
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build --no-restore

  test:
    name: Test on ${{matrix.os}} with .NET ${{matrix.dotnet}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        dotnet: ['8.x', '9.x', '10.x']
        os: ['ubuntu-latest']

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET ${{matrix.dotnet}}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{matrix.dotnet}}
        cache: true
        cache-dependency-path: "**/packages.lock.json"

    - name: Install dependencies
      run: dotnet restore --locked-mode

    - name: Test
      run: dotnet test --no-restore

  formatter:
    name: Format
    runs-on: ubuntu-latest  

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET 8.x
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.x'
        cache: true
        cache-dependency-path: "**/packages.lock.json"

    - name: Install dependencies
      run: dotnet tool install csharpier

    - name: Formatter
      run: dotnet csharpier check .
